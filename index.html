        function calcGrowthRate(current, last) {
            if (last === 0) return current > 0 ? 100.00 : 0.00;
            const rate = ((current - last) / last * 100);
            return Number(rate.toFixed(2));
        }

        const latestData = allData[allData.length - 1];
        const lastData = allData[allData.length - 2];
        const latestConv = conversionData[conversionData.length - 1];
        const latestShortDate = latestData[0].split('-')[1].replace(/^0/, '');
        const lastShortDate = lastData[0].split('-')[1].replace(/^0/, '');

        function initCharts() {
            const userCoreChart = echarts.init(document.getElementById('userCoreChart'));
            userCoreChart.setOption({
                tooltip: {
                    trigger: 'axis',
                    formatter: (params) => {
                        const name = params[0].name;
                        const current = params[0].value;
                        const last = params[1].value;
                        const rate = calcGrowthRate(current, last);
                        return `${name}<br/>本周(${latestShortDate})：${current}<br/>上周(${lastShortDate})：${last}<br/>环比：${rate > 0 ? '+' : ''}${rate}%`;
                    }
                },
                legend: { data: [`本周(${latestShortDate})`, `上周(${lastShortDate})`], top: 10 },
                grid: { left: '5%', right: '8%', bottom: '10%', containLabel: true },
                xAxis: {
                    type: 'category',
                    data: ['新增注册', '新增KYC', '新增激活卡', '活跃用户', 'PC端访问用户']
                },
                yAxis: { type: 'value', name: '用户数' },
                series: [
                    {
                        name: `本周(${latestShortDate})`,
                        type: 'bar',
                        data: [latestData[1], latestData[2], latestData[3], latestData[4], latestData[5]],
                        itemStyle: { color: '#409EFF' },
                        label: { show: true, position: 'top', fontSize: 11 }
                    },
                    {
                        name: `上周(${lastShortDate})`,
                        type: 'bar',
                        data: [lastData[1], lastData[2], lastData[3], lastData[4], lastData[5]],
                        itemStyle: { color: '#909399' },
                        label: { show: true, position: 'top', fontSize: 11 }
                    }
                ]
            });

                tooltip: { trigger: 'axis' },

                grid: { left: '5%', right: '8%', bottom: '10%', containLabel: true },
                xAxis: { type: 'category', data: allData.map(item => item[0].slice(5)), axisLabel: { rotate: 30 } },
                yAxis: { type: 'value', name: '用户数' },
                series: [
                    {
                        name: '累计注册用户',
                        type: 'line',
                        symbol: 'circle',
                        lineStyle: { width: 3 },
                        data: allData.map(item => item[6]),
                        itemStyle: { color: '#E6A23C' },
                        markPoint: { data: [{type: 'max', name: '最大值'}] }
                    },
                    {
                        name: '累计KYC用户',
                        type: 'line',
                        symbol: 'circle',
                        lineStyle: { width: 3 },
                        data: allData.map(item => item[7]),
                        itemStyle: { color: '#67C23A' },
                        markPoint: { data: [{type: 'max', name: '最大值'}] }
                    },
                    {
                        name: '累计开卡用户',
                        type: 'line',
                        symbol: 'circle',
                        lineStyle: { width: 3 },
                        data: cumulativeCardUsers,
                        itemStyle: { color: '#F56C6C' },
                        markPoint: { data: [{type: 'max', name: '最大值'}] }

                xAxis: { type: 'category', data: allData.map(item => item[0].slice(5)), axisLabel: { rotate: 30 } },
                yAxis: [
                    { type: 'value', name: '数量', position: 'left' },
                    { type: 'value', name: '金额(USD)', position: 'right', axisLabel: { formatter: '${value}' } }
                ],
                series: [
                    {
                        name: '交易用户数',
                        type: 'bar',
                        yAxisIndex: 0,
                        data: allData.map(item => item[8]),
                        itemStyle: { color: '#F56C6C' },
                        label: { show: true, position: 'top', fontSize: 10 }

                        name: '交易笔数',
                        type: 'bar',
                        yAxisIndex: 0,

                        itemStyle: { color: '#4E5BA6' },
                        label: { show: true, position: 'top', fontSize: 10 }

                        name: '交易金额(USD)',
                        type: 'line',
                        symbol: 'circle',
                        yAxisIndex: 1,
                        lineStyle: { width: 3 },
                        data: allData.map(item => item[10]),
                        itemStyle: { color: '#FF7272' },

            const funnelChart = echarts.init(document.getElementById('funnelChart'));

                tooltip: { trigger: 'item', formatter: '{b}: {c}%' },
                legend: { data: ['注册→KYC', 'KYC→开卡', '开卡→首笔交易'], bottom: 10 },
                series: [{
                    name: `转化率(${latestShortDate})`,
                    type: 'funnel',
                    left: '10%',
                    top: '15%',
                    bottom: '25%',
                    width: '80%',
                    sort: 'descending',
                    gap: 5,
                    label: { show: true, position: 'inside', formatter: '{b}\n{c}%' },
                    itemStyle: { borderColor: '#fff', borderWidth: 1 },
                    data: [
                        { name: '注册→KYC', value: latestConv[1], itemStyle: { color: '#409EFF' } },
                        { name: 'KYC→开卡', value: latestConv[2], itemStyle: { color: '#67C23A' } },
                        { name: '开卡→首笔交易', value: latestConv[3], itemStyle: { color: '#E6A23C' } }
                    ]
                }]
            });

            const trendChart = echarts.init(document.getElementById('trendChart'));
            trendChart.setOption({
                tooltip: { trigger: 'axis' },
                legend: { data: ['新增注册', '活跃用户', '交易金额(USD)'], top: 10 },
                grid: { left: '5%', right: '8%', bottom: '10%', containLabel: true },
                xAxis: { type: 'category', data: allData.map(item => item[0].slice(5)), axisLabel: { rotate: 30 } },
                yAxis: [
                    { type: 'value', name: '用户数', position: 'left' },
                    { type: 'value', name: '金额(USD)', position: 'right' }
                ],
                series: [
                    {
                        name: '新增注册',
                        type: 'line',
                        symbol: 'circle',
                        yAxisIndex: 0,
                        data: allData.map(item => item[1]),
                        itemStyle: { color: '#409EFF' },
                        smooth: true
                    },
                    {
                        name: '活跃用户',
                        type: 'line',
                        symbol: 'circle',
                        yAxisIndex: 0,
                        data: allData.map(item => item[4]),
                        itemStyle: { color: '#67C23A' },
                        smooth: true

                    {
                        name: '交易金额(USD)',
                        type: 'line',
                        symbol: 'circle',
                        yAxisIndex: 1,
                        data: allData.map(item => item[10]),

                        smooth: true

                userCoreChart.resize();
                userTotalChart.resize();
                transactionChart.resize();
                funnelChart.resize();
                trendChart.resize();
            };
